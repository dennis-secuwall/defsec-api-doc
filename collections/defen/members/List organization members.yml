info:
  name: List organization members
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/{{version}}/organizations/members?page_index=0&page_size=10&include_deactivated=true"
  params:
    - name: page_index
      value: "0"
      type: query
    - name: page_size
      value: "10"
      type: query
    - name: include_deactivated
      value: "true"
      type: query
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
