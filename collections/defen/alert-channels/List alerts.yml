info:
  name: List alerts
  type: http
  seq: 7

http:
  method: GET
  url: "{{url}}/{{version}}/alerts?page_index=0&page_size=20"
  params:
    - name: page_index
      value: "0"
      type: query
    - name: page_size
      value: "20"
      type: query
    - name: severity_level
      value: ""
      type: query
      description: 1=critical, 2=high, 3=medium, 4=low
      disabled: true
    - name: start_time
      value: ""
      type: query
      description: Unix millis
      disabled: true
    - name: end_time
      value: ""
      type: query
      description: Unix millis
      disabled: true
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
