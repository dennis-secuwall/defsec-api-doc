info:
  name: Get an alert channel
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/{{version}}/alerts/channels/:alert_channel_id"
  params:
    - name: alert_channel_id
      value: ""
      type: path
      description: Alert channel ID (UUID)
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
