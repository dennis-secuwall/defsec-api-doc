info:
  name: List source configs
  type: http
  seq: 5

http:
  method: GET
  url: "{{url}}/{{version}}/organizations/tenants/detail/source-configs?page_index=0&page_size=20"
  params:
    - name: page_index
      value: "0"
      type: query
    - name: page_size
      value: "20"
      type: query
    - name: type_filter
      value: "1"
      type: query
      description: 1=S3, 2=WEBHOOK
      disabled: true
    - name: status_filter
      value: "1"
      type: query
      description: 1=ACTIVE, 2=PENDING, 3=ERROR, 4=INACTIVE
      disabled: true
    - name: search
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
