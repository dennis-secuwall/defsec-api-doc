info:
  name: Create source config (S3 + CRON strategy=3)
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/{{version}}/organizations/tenants/detail/source-configs"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "My S3 Source (Cron)",
        "source_type": 1,
        "ingestion_strategy": 3,
        "s3_config": {
          "bucket": "my-log-bucket",
          "prefix": "logs/",
          "region": "eu-west-1",
          "access_key_id": "AKIAIOSFODNN7EXAMPLE",
          "secret_access_key": "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY",
          "poll_interval_secs": 300
        }
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
