info:
  name: Mock create source config (S3 SQS, non-prod)
  type: http
  seq: 12

http:
  method: POST
  url: "{{url}}/{{version}}/mock/source-configs"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Mock S3 Source",
        "source_type": 1,
        "ingestion_strategy": 1,
        "s3_config": {
          "bucket": "my-log-bucket",
          "prefix": "logs/",
          "region": "eu-west-1",
          "access_key_id": "AKIAIOSFODNN7EXAMPLE",
          "secret_access_key": "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY",
          "sqs_queue_url": "https://sqs.eu-west-1.amazonaws.com/123456789012/my-queue",
          "sqs_region": "eu-west-1"
        }
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
