info:
  name: update password
  type: http
  seq: 5

http:
  method: PUT
  url: "{{url}}/{{version}}/users/me/change-password"
  body:
    type: json
    data: |-
      {
          "current_password" : "Password123!",
          "new_password": "Password123!!"
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
