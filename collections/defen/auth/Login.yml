    token: "{{access_token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const res = res.getBody();


        if (res?.data) {
            bru.setEnvVar("access_token", res.data.access_token);
            bru.setEnvVar("refresh_token", res.data.refresh_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
