runtime:
  scripts:
    - type: after-response
      code: |-
        const response = res.getBody();

                if (!response) {
                    console.error("Không nhận được response body");
                    return;
                }

                const data = response.data;

                if (data && data.access_token) {
                    // 1. Thử lưu Global trước
                    
                    // 2. Lưu luôn vào Env (nếu có active) để chắc chắn
                    try {
                        bru.setVar("access_token", data.access_token);
                        bru.setVar("refresh_token", data.refresh_token);
                    } catch (e) {
                        console.log("Không có Env để lưu, nhưng Global chắc đã ăn");
                    }

                    console.log("✅ Token đã được xử lý");
                } else {
                    console.error("❌ Cấu trúc JSON không đúng: ", response);
                }

