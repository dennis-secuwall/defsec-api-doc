info:
  name: List tenants
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/{{version}}/organizations/tenants?page_index=0&page_size=10"
  params:
    - name: page_index
      value: "0"
      type: query
    - name: page_size
      value: "10"
      type: query
    - name: name_filter
      value: ""
      type: query
      disabled: true
    - name: status_filter
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
